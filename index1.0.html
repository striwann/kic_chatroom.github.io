<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Chatroom CSS -->
    <link rel="stylesheet" href="https://cdn.statically.io/gh/weberi/chatroom/master/dist/Chatroom.css" />

    <!-- Custom Modern Styling -->
    <style>
        body {
            background: linear-gradient(135deg, #1f2937, #111827);
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 380px;
            height: 600px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
            background: #ffffff;
        }

        /* Chatroom Overrides */
        .chatroom {
            border-radius: 18px !important;
            background: #ffffff !important;
        }

        .chatroom-header {
            background: #4f46e5 !important;
            color: white !important;
            font-size: 18px !important;
            font-weight: 600 !important;
            padding: 16px !important;
        }

        .chatroom-message.bot {
            background: #eef2ff !important;
            color: #1e1b4b !important;
            border-radius: 14px !important;
            padding: 12px 14px !important;
            margin: 8px 0 !important;
        }

        .chatroom-message.user {
            background: #4f46e5 !important;
            color: white !important;
            border-radius: 14px !important;
            padding: 12px 14px !important;
            margin: 8px 0 !important;
        }

        .chatroom-input {
            border-top: 1px solid #e5e7eb !important;
            padding: 12px !important;
        }

        .chatroom-input textarea {
            border-radius: 12px !important;
            border: 1px solid #d1d5db !important;
            padding: 10px !important;
            font-size: 14px !important;
        }

        .chatroom-send-btn {
            background: #4f46e5 !important;
            border-radius: 10px !important;
            padding: 10px 16px !important;
            font-weight: 600 !important;
        }

        .chatroom-send-btn:hover {
            background: #4338ca !important;
        }
    </style>
</head>

<body>
    <div class="chat-container"></div>

    <script src="https://cdn.statically.io/gh/weberi/chatroom/master/dist/Chatroom.js"></script>

    <script>
        var chatroom = new window.Chatroom({
            host: "https://your-codespace-url-5005.preview.app.github.dev",
            title: "Chat with a bot",
            container: document.querySelector(".chat-container"),
            welcomeMessage: "Nice to meet you.",
            speechRecognition: "en-US",
            voiceLang: "en-US"
        });
        chatroom.openChat();
    </script>
</body>

</html>
