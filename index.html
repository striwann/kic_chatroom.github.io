<!DOCTYPE html>
<html lang="de">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Chatroom</title>

   <!-- Original Chatroom CSS -->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css">
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

   <!-- ⭐ Custom Design direkt in der HTML -->
   <style>
      body {
         margin: 0;
         padding: 0;
         background: linear-gradient(135deg, #e3f2fd, #bbdefb);
         font-family: 'Inter', sans-serif;
      }

      .chat-wrapper {
         width: 420px;
         max-width: 90%;
         margin: 40px auto;
         background: rgba(255, 255, 255, 0.55);
         backdrop-filter: blur(14px);
         border-radius: 22px;
         box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
         overflow: hidden;
         border: 1px solid rgba(255, 255, 255, 0.4);
      }

      .chat-header {
         background: rgba(0, 102, 204, 0.9);
         color: white;
         padding: 16px;
         font-size: 18px;
         font-weight: 600;
         text-align: center;
         letter-spacing: 0.3px;
      }

      /* Nachrichten */
      .message {
         margin: 12px;
         padding: 12px 16px;
         border-radius: 18px;
         max-width: 80%;
         animation: fadeIn 0.25s ease;
      }

      .message.user {
         background: #0066cc !important;
         color: white !important;
         margin-left: auto;
         border-bottom-right-radius: 4px;
      }

      .message.bot {
         background: rgba(255, 255, 255, 0.8) !important;
         color: #222 !important;
         border-bottom-left-radius: 4px;
         border: 1px solid rgba(0, 0, 0, 0.05);
      }

      /* Eingabefeld */
      .chat-input {
         padding: 12px;
         background: rgba(255, 255, 255, 0.7);
         backdrop-filter: blur(10px);
         display: flex;
         gap: 10px;
         border-top: 1px solid rgba(0, 0, 0, 0.05);
      }

      .chat-input input {
         flex: 1;
         padding: 12px;
         border-radius: 14px;
         border: 1px solid #ccc;
         font-size: 15px;
         outline: none;
         transition: 0.2s;
      }

      .chat-input input:focus {
         border-color: #0066cc;
         box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.2);
      }

      .chat-input button {
         background: #0066cc;
         color: white;
         border: none;
         padding: 12px 18px;
         border-radius: 14px;
         cursor: pointer;
         font-weight: 600;
         transition: 0.2s;
      }

      .chat-input button:hover {
         background: #0052a3;
      }

      @keyframes fadeIn {
         from {
            opacity: 0;
            transform: translateY(6px);
         }

         to {
            opacity: 1;
            transform: translateY(0);
         }
      }
   </style>
</head>

<body>

   <div class="chat-wrapper">
      <div class="chat-header">Chat with a bot</div>
      <div class="chat-container"></div>
   </div>

   <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>
   <script type="text/javascript">
      var chatroom = new window.Chatroom({
         host: "https://probable-carnival-969776w6xw5x374v5-5005.app.github.dev",
         title: "Chat with a bot",
         container: document.querySelector(".chat-container"),
         welcomeMessage: "Nice to meet you.",
         speechRecognition: "en-US",
         voiceLang: "en-US"
      });
      chatroom.openChat();
   </script>

</body>

</html>
