<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Chatroom</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css">
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

   <style>
      /* 1. Gesamter Hintergrund des Chat-Containers */
      .chat-container, 
      .chat-container .chatroom,
      .chat-container .chatroom .chat-body {
         background-color: #f0f2f5 !important; /* Hier deine Wunsch-Hintergrundfarbe eintragen */
         background: #f0f2f5 !important;      /* Sicherung, falls ein Farbverlauf aktiv war */
      }

      /* 2. Sprachblasen vom BOT (meistens links) */
      .chat-container .chatroom .chat-message.bot,
      .chat-container .chatroom .message-box.bot-message, /* Falls die Klasse so heißt */
      .chat-container .chatroom .chat-message:not(.user) { /* Fallback-Selektor */
         background-color: #ffffff !important; /* Hintergrund der Bot-Blase */
         color: #333333 !important;           /* Textfarbe des Bots */
         border-radius: 12px !important;
      }

      /* 3. Sprachblasen vom USER (du selbst, meistens rechts) */
      .chat-container .chatroom .chat-message.user,
      .chat-container .chatroom .message-box.user-message {
         background-color: #007bff !important; /* Hintergrund deiner Blase (z.B. Chatbot-Blau) */
         color: #ffffff !important;           /* Deine Textfarbe (Weiß) */
         border-radius: 12px !important;
      }
   </style>
</head>

<body>
   <div class="chat-container"></div>
   <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>
   <script type="text/javascript">
      var chatroom = new window.Chatroom({
         host: "https://probable-carnival-969776w6xw5x374v5-5005.app.github.dev/",
         title: "Chat with a bot",
         container: document.querySelector(".chat-container"),
         welcomeMessage: "Nice to meet you.",
         speechRecognition: "en-US",
         voiceLang: "en-US"
      });
      chatroom.openChat();
   </script>
</body>

</html>
