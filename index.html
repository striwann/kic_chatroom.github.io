<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Weather Chatroom</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.css" />
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/index.css">
   <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/themes/theme2.css" />

   <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
         height: 100%;
         font-family: 'DM Sans', sans-serif;
         overflow: hidden;
      }

      /* ── Dynamic city background ── */
      #bg-layer {
         position: fixed;
         inset: 0;
         z-index: 0;
         background: #0d0d1a center/cover no-repeat;
         transition: opacity 1s ease;
      }

      #bg-layer.loading { opacity: 0.4; }

      /* dark overlay so text stays readable */
      #bg-overlay {
         position: fixed;
         inset: 0;
         z-index: 1;
         background: linear-gradient(
            135deg,
            rgba(5, 5, 20, 0.72) 0%,
            rgba(10, 10, 35, 0.55) 50%,
            rgba(5, 5, 20, 0.72) 100%
         );
         backdrop-filter: blur(1px);
      }

      /* ── City label badge ── */
      #city-badge {
         position: fixed;
         top: 20px;
         right: 20px;
         z-index: 10;
         display: flex;
         align-items: center;
         gap: 8px;
         padding: 8px 16px;
         border-radius: 999px;
         background: rgba(255,255,255,0.1);
         border: 1px solid rgba(255,255,255,0.2);
         backdrop-filter: blur(16px);
         color: #fff;
         font-family: 'Syne', sans-serif;
         font-size: 0.85rem;
         font-weight: 700;
         letter-spacing: 0.05em;
         text-transform: uppercase;
         opacity: 0;
         transform: translateY(-10px);
         transition: opacity 0.5s ease, transform 0.5s ease;
         pointer-events: none;
      }

      #city-badge.visible {
         opacity: 1;
         transform: translateY(0);
      }

      #city-badge .badge-icon { font-size: 1rem; }

      /* ── Layout ── */
      .app-wrapper {
         position: relative;
         z-index: 2;
         height: 100vh;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         padding: 24px;
         gap: 16px;
      }

      /* ── Header ── */
      .app-header {
         text-align: center;
         animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes slideDown {
         from { opacity: 0; transform: translateY(-30px); }
         to   { opacity: 1; transform: translateY(0); }
      }

      .app-header h1 {
         font-family: 'Syne', sans-serif;
         font-weight: 800;
         font-size: clamp(2rem, 5vw, 3.2rem);
         letter-spacing: -0.02em;
         line-height: 1;
         color: #fff;
         text-shadow: 0 2px 30px rgba(0,0,0,0.5);
      }

      .app-header h1 span {
         background: linear-gradient(135deg, #ffd93d, #ff6b6b);
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         background-clip: text;
      }

      .app-header p {
         margin-top: 8px;
         color: rgba(255,255,255,0.55);
         font-size: 0.9rem;
         font-weight: 300;
         letter-spacing: 0.04em;
      }

      /* ── Status pills ── */
      .status-bar {
         display: flex;
         gap: 8px;
         animation: fadeUp 1s 0.3s both;
      }

      @keyframes fadeUp {
         from { opacity: 0; transform: translateY(10px); }
         to   { opacity: 1; transform: translateY(0); }
      }

      .pill {
         display: flex;
         align-items: center;
         gap: 6px;
         padding: 5px 14px;
         border-radius: 999px;
         font-size: 0.72rem;
         font-weight: 500;
         letter-spacing: 0.05em;
         border: 1px solid rgba(255,255,255,0.15);
         background: rgba(255,255,255,0.08);
         backdrop-filter: blur(10px);
         color: rgba(255,255,255,0.8);
      }

      .pill-dot {
         width: 6px; height: 6px;
         border-radius: 50%;
         animation: pulse 2s ease-in-out infinite;
      }
      .pill-dot.green  { background: #6bcb77; box-shadow: 0 0 6px #6bcb77; }
      .pill-dot.amber  { background: #ffd93d; box-shadow: 0 0 6px #ffd93d; }
      .pill-dot.blue   { background: #4d96ff; box-shadow: 0 0 6px #4d96ff; }

      @keyframes pulse {
         0%,100% { opacity:1; transform:scale(1); }
         50%      { opacity:0.4; transform:scale(0.75); }
      }

      /* ── Chat card ── */
      .chat-card {
         width: 100%;
         max-width: 680px;
         border-radius: 24px;
         overflow: hidden;
         border: 1px solid rgba(255,255,255,0.14);
         background: rgba(8, 8, 25, 0.55);
         backdrop-filter: blur(28px);
         box-shadow:
            0 0 0 1px rgba(255,255,255,0.04),
            0 32px 80px rgba(0,0,0,0.6),
            0 0 80px rgba(77,150,255,0.07);
         animation: riseUp 0.9s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
         position: relative;
      }

      @keyframes riseUp {
         from { opacity:0; transform:translateY(40px) scale(0.97); }
         to   { opacity:1; transform:translateY(0) scale(1); }
      }

      /* animated top border */
      .chat-card::before {
         content: '';
         position: absolute;
         top:0; left:0; right:0;
         height: 2px;
         background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff, #ff6b6b);
         background-size: 200% 100%;
         animation: borderFlow 3s linear infinite;
         z-index: 10;
      }

      @keyframes borderFlow {
         from { background-position: 0% 0%; }
         to   { background-position: 200% 0%; }
      }

      /* ── Chatroom library overrides ── */
      .chat-container { height: 500px; }

      .chat-container .rw-widget-container,
      .chat-container .rw-conversation-container {
         background: transparent !important;
         border: none !important;
         box-shadow: none !important;
         border-radius: 0 !important;
         height: 100% !important;
      }

      .chat-container .rw-header {
         background: rgba(255,255,255,0.05) !important;
         border-bottom: 1px solid rgba(255,255,255,0.1) !important;
         padding: 16px 20px !important;
      }

      .chat-container .rw-title {
         font-family: 'Syne', sans-serif !important;
         font-weight: 700 !important;
         font-size: 1rem !important;
         color: #fff !important;
      }

      .chat-container .rw-sub-title {
         color: rgba(255,255,255,0.5) !important;
         font-size: 0.75rem !important;
      }

      .chat-container .rw-messages-container {
         background: transparent !important;
         padding: 14px !important;
      }

      /* Bot bubble */
      .chat-container .rw-response .rw-message-text,
      .chat-container .rw-message.rw-with-avatar .rw-client {
         background: rgba(255,255,255,0.1) !important;
         border: 1px solid rgba(255,255,255,0.12) !important;
         color: #f0f0ff !important;
         border-radius: 16px 16px 16px 4px !important;
         font-family: 'DM Sans', sans-serif !important;
         font-size: 0.88rem !important;
      }

      /* User bubble */
      .chat-container .rw-message.rw-message-client .rw-client,
      .chat-container .rw-client .rw-message-text {
         background: linear-gradient(135deg, #4d96ff, #c77dff) !important;
         border: none !important;
         color: #fff !important;
         border-radius: 16px 16px 4px 16px !important;
         font-family: 'DM Sans', sans-serif !important;
         font-size: 0.88rem !important;
         box-shadow: 0 4px 20px rgba(77,150,255,0.35) !important;
      }

      /* Input area */
      .chat-container .rw-sender {
         background: rgba(255,255,255,0.04) !important;
         border-top: 1px solid rgba(255,255,255,0.08) !important;
         padding: 12px 14px !important;
      }

      .chat-container .rw-new-message {
         background: rgba(255,255,255,0.07) !important;
         border: 1px solid rgba(255,255,255,0.15) !important;
         border-radius: 12px !important;
         color: #f0f0ff !important;
         font-family: 'DM Sans', sans-serif !important;
         padding: 10px 16px !important;
         transition: border-color 0.2s, box-shadow 0.2s;
      }

      .chat-container .rw-new-message:focus {
         border-color: rgba(77,150,255,0.5) !important;
         box-shadow: 0 0 0 3px rgba(77,150,255,0.15) !important;
         outline: none !important;
      }

      .chat-container .rw-new-message::placeholder {
         color: rgba(255,255,255,0.3) !important;
      }

      .chat-container .rw-send {
         background: linear-gradient(135deg, #4d96ff, #c77dff) !important;
         border: none !important;
         border-radius: 10px !important;
         color: #fff !important;
         transition: transform 0.15s, box-shadow 0.15s;
         box-shadow: 0 4px 16px rgba(77,150,255,0.4) !important;
      }

      .chat-container .rw-send:hover {
         transform: scale(1.07) !important;
         box-shadow: 0 6px 22px rgba(77,150,255,0.55) !important;
      }

      .chat-container .rw-avatar {
         background: linear-gradient(135deg, #c77dff, #4d96ff) !important;
         border: 2px solid rgba(255,255,255,0.15) !important;
      }

      .chat-container ::-webkit-scrollbar { width: 4px; }
      .chat-container ::-webkit-scrollbar-track { background: transparent; }
      .chat-container ::-webkit-scrollbar-thumb {
         background: rgba(255,255,255,0.12);
         border-radius: 4px;
      }

      /* ── Footer ── */
      .app-footer {
         font-size: 0.7rem;
         color: rgba(255,255,255,0.35);
         letter-spacing: 0.06em;
         animation: fadeUp 1.2s 0.6s both;
      }
   </style>
</head>

<body>

   <!-- Dynamic background -->
   <div id="bg-layer"></div>
   <div id="bg-overlay"></div>

   <!-- City name badge (top-right) -->
   <div id="city-badge">
      <span class="badge-icon">📍</span>
      <span id="city-name-label">—</span>
   </div>

   <div class="app-wrapper">
      <header class="app-header">
         <h1>Weather <span>Chat</span></h1>
         <p>Ask me about the weather in any city</p>
      </header>

      <div class="status-bar">
         <div class="pill"><span class="pill-dot green"></span> Bot online</div>
         <div class="pill"><span class="pill-dot amber"></span> Weather API ready</div>
         <div class="pill"><span class="pill-dot blue"></span> Voice enabled</div>
      </div>

      <div class="chat-card">
         <div class="chat-container"></div>
      </div>

      <footer class="app-footer">Type a city name — the background will update automatically</footer>
   </div>

   <script src="https://cdn.jsdelivr.net/gh/weberi/chatroom@master/dist/Chatroom.js"></script>
   <script>
      // ── City background logic ──────────────────────────────────────────────

      const bgLayer   = document.getElementById('bg-layer');
      const badge     = document.getElementById('city-badge');
      const cityLabel = document.getElementById('city-name-label');

      let currentCity = null;
      let debounceTimer = null;

      // Common city names + German variants that the bot might receive
      // Extended list so detection is robust
      const CITY_HINTS = [
         'wien','vienna','berlin','hamburg','münchen','munich','frankfurt','köln','cologne',
         'düsseldorf','stuttgart','Leipzig','dortmund','essen','bremen','hannover',
         'paris','london','madrid','barcelona','rome','roma','amsterdam','zürich','zurich',
         'bern','geneva','genf','lausanne','salzburg','graz','linz','innsbruck',
         'new york','los angeles','chicago','tokyo','tokio','beijing','peking',
         'sydney','dubai','singapore','singapur','istanbul','moscow','moskau',
         'prague','prag','budapest','warsaw','warschau','stockholm','oslo','copenhagen',
         'helsinki','athens','athen','lisbon','lissabon','brussels','brüssel',
         'vancouver','toronto','montreal','mexico city','buenos aires','rio de janeiro',
         'cape town','nairobi','mumbai','delhi','bangkok','seoul','shanghai',
         // add more as needed
      ];

      function detectCity(text) {
         const lower = text.toLowerCase();
         // First try: direct match from known list
         for (const city of CITY_HINTS) {
            if (lower.includes(city)) return city;
         }
         // Fallback: look for patterns like "Wetter in <Stadt>" or "weather in <City>"
         const patterns = [
            /(?:wetter|weather|forecast|wettervorhersage|temperatur(?:en)?)\s+(?:in|für|for|von|of)\s+([a-zäöüÄÖÜß\s\-]{2,25})/i,
            /(?:in|für|for)\s+([A-ZÄÖÜ][a-zäöüß\-]{2,20})(?:\s|,|\.|\?|!|$)/,
            /^([A-ZÄÖÜ][a-zäöüß\-]{2,20})(?:\s*[,?!]|\s*$)/,
         ];
         for (const re of patterns) {
            const m = text.match(re);
            if (m) return m[1].trim();
         }
         return null;
      }

      function loadCityBackground(city) {
         if (!city || city.toLowerCase() === currentCity) return;
         currentCity = city.toLowerCase();

         // Capitalize for display
         const displayName = city.split(' ')
            .map(w => w.charAt(0).toUpperCase() + w.slice(1))
            .join(' ');

         cityLabel.textContent = displayName;
         badge.classList.add('visible');
         bgLayer.classList.add('loading');

         // Use Unsplash Source API — no key needed, returns a random matching photo
         const query = encodeURIComponent(city + ' city skyline');
         const url   = `https://source.unsplash.com/1920x1080/?${query}`;

         const img = new Image();
         img.onload = () => {
            bgLayer.style.backgroundImage = `url('${img.src}')`;
            bgLayer.classList.remove('loading');
         };
         img.onerror = () => {
            // Fallback: try just the city name
            bgLayer.style.backgroundImage =
               `url('https://source.unsplash.com/1920x1080/?${encodeURIComponent(city)}')`;
            bgLayer.classList.remove('loading');
         };
         img.src = url;
      }

      // ── Hook into the chatroom input field ────────────────────────────────

      function attachInputListener() {
         // The chatroom library renders its input asynchronously; poll for it
         const input = document.querySelector('.rw-new-message');
         if (!input) { setTimeout(attachInputListener, 300); return; }

         input.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const text = input.value.trim();
            if (!text) return;

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
               const city = detectCity(text);
               if (city) loadCityBackground(city);
            }, 100);
         });

         // Also watch send button clicks
         const observer = new MutationObserver(() => {
            // When a new user message bubble appears, grab its text
            const bubbles = document.querySelectorAll('.rw-message-client .rw-message-text');
            if (!bubbles.length) return;
            const last = bubbles[bubbles.length - 1].textContent.trim();
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
               const city = detectCity(last);
               if (city) loadCityBackground(city);
            }, 200);
         });

         const msgContainer = document.querySelector('.rw-messages-container');
         if (msgContainer) {
            observer.observe(msgContainer, { childList: true, subtree: true });
         }
      }

      // ── Init chatroom ─────────────────────────────────────────────────────

      var chatroom = new window.Chatroom({
         host: "https://probable-carnival-969776w6xw5x374v5-5005.app.github.dev",
         title: "Chat with a bot",
         container: document.querySelector(".chat-container"),
         welcomeMessage: "Nice to meet you. Ask me about the weather in any city!",
         speechRecognition: "en-US",
         voiceLang: "en-US"
      });
      chatroom.openChat();

      // Start watching after a short delay so the library has rendered
      setTimeout(attachInputListener, 800);
   </script>
</body>
</html>
